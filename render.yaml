# Render deployment configuration
# https://render.com/docs/yaml-spec

services:
  - type: web
    name: vortex-2026-backend
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false # Set in Render dashboard
      - key: ACCOMMODATION_SHEET_ID
        sync: false # Set in Render dashboard
      - key: EVENTS_SHEET_ID
        sync: false # Set in Render dashboard
      - key: WORKSHOPS_SHEET_ID
        sync: false # Set in Render dashboard
      - key: API_SECRET_KEY
        generateValue: true # Auto-generate secure key
      - key: ALLOWED_ORIGINS
        sync: false # Set in Render dashboard (e.g., https://your-frontend.vercel.app)
      - key: REGISTRATION_DATA_PATH
        value: data/sample_registration_data.json
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
    autoDeploy: true
